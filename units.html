<!doctype html>
<html class="fixed">
<head>
  <meta charset="UTF-8">
  <title>DESKHUB | Units</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800" rel="stylesheet">
  <link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.css" />
  <link rel="stylesheet" href="assets/vendor/font-awesome/css/font-awesome.css" />
  <link rel="stylesheet" href="assets/vendor/nanoscroller/nanoscroller.css" />
  <link rel="stylesheet" href="assets/stylesheets/theme.css" />
  <link rel="stylesheet" href="assets/stylesheets/skins/default.css" />
  <link rel="stylesheet" href="assets/stylesheets/theme-custom.css" />
  <script src="assets/vendor/modernizr/modernizr.js"></script>

  <style>
    #unitsTable tbody tr:hover {
      background-color: #f0f8ff !important;
      cursor: pointer;
    }
    #unitsTable tbody tr.selected {
      background-color: #d0e9ff !important;
    }
  </style>
</head>
<body>
  <section class="body">
    <header class="header">
      <div class="logo-container">
        <a href="index.html" class="logo">
          <img src="assets/images/deskhub.png" height="50" alt="DESKHUB" />
        </a>
        <div class="visible-xs toggle-sidebar-left"
             data-toggle-class="sidebar-left-opened"
             data-target="html"
             data-fire-event="sidebar-left-opened">
          <i class="fa fa-bars" aria-label="Toggle sidebar"></i>
        </div>
      </div>
    </header>

    <div class="inner-wrapper">
      <aside id="sidebar-left" class="sidebar-left">
        <div class="sidebar-header">
          <div class="sidebar-toggle hidden-xs"
               data-toggle-class="sidebar-left-collapsed"
               data-target="html"
               data-fire-event="sidebar-left-toggle">
            <i class="fa fa-bars" aria-label="Toggle sidebar"></i>
          </div>
        </div>
        <div class="nano">
          <div class="nano-content">
            <nav id="menu" class="nav-main">
              <ul class="nav nav-main">
                <li><a href="index.html"><i class="fa fa-home"></i><span>Dashboard</span></a></li>
                <li class="nav-parent nav-expanded nav-active">
                  <a><i class="fa fa-archive"></i><span>Inventory</span></a>
                  <ul class="nav nav-children">
                    <li><a href="items.html">Items</a></li>
                    <li><a href="models.html">Models</a></li>
                    <li class="nav-active"><a href="units.html">Units</a></li>
                  </ul>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </aside>

      <section role="main" class="content-body">
        <header class="page-header">
          <h2>Units</h2>
        </header>

        <section class="panel">
          <header class="panel-heading">
            <h2 class="panel-title">Manage Units</h2>
          </header>
          <div class="panel-body">
            <div class="mb-sm">
              <button class="btn btn-primary" id="btnNew">New</button>
              <button class="btn btn-default" id="btnEdit">Edit</button>
              <button class="btn btn-default" id="btnDelete">Delete</button>
              <button class="btn btn-info" id="btnRefresh">Refresh</button>
            </div>

            <div class="row mb-md">
              <div class="col-sm-6">
                <label>
                  Show
                  <select id="rowCount" class="form-control input-sm" style="width: auto; display: inline-block;">
                    <option value="10">10</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>
                  entries
                </label>
              </div>
              <div class="col-sm-6 text-right">
                <label>
                  Search:
                  <input type="text" id="searchInput" class="form-control input-sm" style="width: auto; display: inline-block;">
                  <button class="btn btn-sm btn-default" onclick="filterTable()">Search</button>
                </label>
              </div>
            </div>

            <table class="table table-hover table-bordered table-striped mb-none" id="unitsTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Item</th>
                  <th>Model</th>
                  <th>Serial Number</th>
                  <th>Brand</th>
                  <th>Purchase Date</th>
                  <th>Last Cal.</th>
                  <th>Next Cal.</th>
                  <th>PO Number</th>
                  <th>Invoice Number</th>
                  <th>Invoice Date</th>
                  <th>Amount</th>
                  <th>Subscription Info</th>
                  <th>Last Updated</th>
                  <th>Updated By</th>
                  <th>Remarks</th>
                </tr>
              </thead>
              <tbody id="unitsTableBody">
                <!-- frontend JS will populate rows -->
              </tbody>
            </table>

          </div>
        </section>
      </section>
    </div>
  </section>

  <!-- Modal -->
  <div class="modal fade" id="unitModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <form id="unitForm" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">New Unit</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="unitId" />

          <div class="form-group">
            <label for="unitItem">Item</label>
            <select class="form-control" id="unitItem" required></select>
          </div>
          <div class="form-group">
            <label for="unitModel">Model</label>
            <select class="form-control" id="unitModel" required></select>
          </div>
          <div class="form-group">
            <label for="serialNumber">Serial Number</label>
            <input type="text" class="form-control" id="serialNumber" />
          </div>
          <div class="form-group">
            <label for="brand">Brand</label>
            <input type="text" class="form-control" id="brand" />
          </div>
          <div class="form-group">
            <label for="purchaseDate">Purchase Date</label>
            <input type="date" class="form-control" id="purchaseDate" />
          </div>
          <div class="form-group">
            <label for="lastCalibration">Last Calibration</label>
            <input type="date" class="form-control" id="lastCalibration" />
          </div>
          <div class="form-group">
            <label for="nextCalibration">Next Calibration</label>
            <input type="date" class="form-control" id="nextCalibration" />
          </div>
          <div class="form-group">
            <label for="poNumber">PO Number</label>
            <input type="text" class="form-control" id="poNumber" />
          </div>
          <div class="form-group">
            <label for="invoiceNumber">Invoice Number</label>
            <input type="text" class="form-control" id="invoiceNumber" />
          </div>
          <div class="form-group">
            <label for="invoiceDate">Invoice Date</label>
            <input type="date" class="form-control" id="invoiceDate" />
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" class="form-control" id="amount" />
          </div>
          <div class="form-group">
            <label for="subscriptionInfo">Subscription Info</label>
            <input type="text" class="form-control" id="subscriptionInfo" />
          </div>
          <div class="form-group">
            <label for="unitRemarks">Remarks</label>
            <textarea class="form-control" id="unitRemarks" rows="4"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/vendor/jquery/jquery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/nanoscroller/nanoscroller.js"></script>
  <script src="assets/javascripts/theme.js"></script>
  <script src="assets/javascripts/theme.custom.js"></script>
  <script src="assets/javascripts/theme.init.js"></script>
  <script src="assets/javascripts/units.js"></script>

  <script>
    function filterTable() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#unitsTable tbody tr");
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(search) ? "" : "none";
      });
    }

    document.getElementById("rowCount").addEventListener("change", function () {
      const limit = parseInt(this.value);
      const rows = document.querySelectorAll("#unitsTable tbody tr");
      rows.forEach((row, idx) => {
        row.style.display = idx < limit ? "" : "none";
      });
    });

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("rowCount").dispatchEvent(new Event("change"));

      const tableBody = document.getElementById("unitsTableBody");
      tableBody.addEventListener("click", (e) => {
        const row = e.target.closest("tr");
        if (!row) return;
        document.querySelectorAll("#unitsTable tbody tr").forEach(r => r.classList.remove("selected"));
        row.classList.add("selected");
      });
    });
  </script>
</body>
</html>
